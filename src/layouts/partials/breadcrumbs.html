{{ $items := partial "breadcrumbs-data.html" . }}
{{ if gt (len $items) 1 }}
  {{ $lastIndex := sub (len $items) 1 }}
  <nav aria-label="Breadcrumbs">
    <ol>
      {{ range $index, $item := $items }}
        <li>
          {{ if eq $index $lastIndex }}
            <span aria-current="page">{{ $item.name }}</span>
          {{ else }}
            <a href="{{ $item.url }}">{{ $item.name }}</a>
          {{ end }}
        </li>
      {{ end }}
    </ol>
  </nav>
{{ end }}
