<section class="archive-controls" aria-label="Archive filters and sorting">
  <div class="archive-controls__intro">
    <p class="surface-note">Filter by topic, type, year, or sort order.</p>
  </div>

  <div class="archive-controls__mobile">
    <details>
      <summary>Open filters and sort</summary>
      {{ partial "archive/filter-groups.html" (merge . (dict "idPrefix" "archive-mobile")) }}
    </details>
  </div>

  <aside class="archive-rail" aria-label="Archive filter rail">
    {{ partial "archive/filter-groups.html" (merge . (dict "idPrefix" "archive-desktop")) }}
  </aside>
</section>
