{{ if gt .TotalPages 1 }}
  <nav class="pagination" aria-label="Pagination">
    {{ with .Prev }}
      <a href="{{ .URL }}">Previous</a>
    {{ end }}

    {{ range .Pagers }}
      {{ if eq .PageNumber $.PageNumber }}
        <span aria-current="page">{{ .PageNumber }}</span>
      {{ else }}
        <a href="{{ .URL }}">{{ .PageNumber }}</a>
      {{ end }}
    {{ end }}

    {{ with .Next }}
      <a href="{{ .URL }}">Next</a>
    {{ end }}
  </nav>
{{ end }}
