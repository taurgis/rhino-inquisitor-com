name: Build Pull Requests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: 0.157.0
  NODE_VERSION: 20.18.1

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      route_sensitive: ${{ steps.changes.outputs.route_sensitive }}
      markdown_changed: ${{ steps.changes.outputs.markdown_changed }}
      migration_batch_changed: ${{ steps.changes.outputs.migration_batch_changed }}
      full_site_route_validation_required: ${{ steps.changes.outputs.full_site_route_validation_required }}
      validation_mode: ${{ steps.changes.outputs.validation_mode }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git fetch --no-tags --prune origin main
            diff_base=$(git merge-base HEAD origin/main)
            git diff --name-only "$diff_base" HEAD | tee changed-files.txt
          else
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | tee changed-files.txt
          fi

          route_sensitive=false
          if grep -Eq '^(src/content/|src/layouts/|src/static/|src/archetypes/|hugo\.toml$|scripts/|migration/url-manifest\.json$)' changed-files.txt; then
            route_sensitive=true
          fi
          echo "route_sensitive=$route_sensitive" >> "$GITHUB_OUTPUT"

          markdown_changed=false
          if grep -Eq '\.md$' changed-files.txt; then
            markdown_changed=true
          fi
          echo "markdown_changed=$markdown_changed" >> "$GITHUB_OUTPUT"

          migration_batch_changed=false
          if grep -Eq '^(migration/|scripts/|docs/migration/|package\.json$|package-lock\.json$|\.github/workflows/build-pr\.yml$)' changed-files.txt; then
            migration_batch_changed=true
          fi
          echo "migration_batch_changed=$migration_batch_changed" >> "$GITHUB_OUTPUT"

          full_site_route_trigger=false
          if grep -Eq '^(src/content/|src/layouts/|src/static/|src/archetypes/|hugo\.toml$|migration/url-manifest\.json$|package\.json$|package-lock\.json$|\.github/workflows/build-pr\.yml$|\.github/workflows/deploy-pages\.yml$)' changed-files.txt; then
            full_site_route_trigger=true
          fi
          if grep -Eq '^scripts/' changed-files.txt && grep -E '^scripts/' changed-files.txt | grep -Ev '^scripts/migration/' >/dev/null; then
            full_site_route_trigger=true
          fi

          full_site_route_validation_required=false
          validation_mode=baseline

          if [[ "$route_sensitive" == "true" ]]; then
            if [[ "$migration_batch_changed" == "true" && "$full_site_route_trigger" != "true" ]]; then
              validation_mode=migration-batch-only
            else
              full_site_route_validation_required=true
              validation_mode=full-site-route-sensitive
            fi
          elif [[ "$migration_batch_changed" == "true" ]]; then
            validation_mode=migration-supporting
          fi

          echo "full_site_route_validation_required=$full_site_route_validation_required" >> "$GITHUB_OUTPUT"
          echo "validation_mode=$validation_mode" >> "$GITHUB_OUTPUT"

      - name: Summarize validation mode
        shell: bash
        run: |
          {
            echo "### PR validation mode"
            echo "- validation_mode: ${{ steps.changes.outputs.validation_mode }}"
            echo "- route_sensitive: ${{ steps.changes.outputs.route_sensitive }}"
            echo "- migration_batch_changed: ${{ steps.changes.outputs.migration_batch_changed }}"
            echo "- full_site_route_validation_required: ${{ steps.changes.outputs.full_site_route_validation_required }}"
          } >> "$GITHUB_STEP_SUMMARY"

  migration-batch-validation:
    needs:
      - prepare
    if: needs.prepare.outputs.migration_batch_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          export PATH="$HUGO_DIR:$PATH"
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Install Node dependencies
        run: npm ci

      - name: Finalize staged migration content
        run: npm run migrate:finalize-content

      - name: Generate migration item report
        run: npm run migrate:report

      - name: Enforce migration thresholds
        run: npm run check:migration-thresholds

      - name: Build staged migration site
        run: hugo --minify --environment production --contentDir migration/output/content --destination tmp/migration-pr-public

      - name: Validate selected-record URL parity
        run: node scripts/migration/validate-url-parity.js --scope selected-records --records-file migration/intermediate/records.normalized.json --content-dir migration/output/content --public-dir tmp/migration-pr-public

      - name: Validate selected-record redirects
        run: node scripts/migration/check-redirects.js --scope selected-records --records-file migration/intermediate/records.normalized.json --public-dir tmp/migration-pr-public

      - name: Run staged SEO completeness check
        run: npm run check:seo-completeness -- --content-dir migration/output/content --public-dir tmp/migration-pr-public

      - name: Run staged internal link check
        run: CHECK_LINKS_PUBLIC_DIR=tmp/migration-pr-public CHECK_LINKS_ALLOW_MANIFEST_TARGETS=1 CHECK_INTERNAL_LINKS_MODE=subset npm run check:internal-links

      - name: Verify expected migration report artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          required_reports=(
            migration/reports/migration-item-report.csv
            migration/reports/url-parity-report.csv
            migration/reports/conversion-fallbacks.csv
            migration/reports/media-integrity-report.csv
            migration/reports/frontmatter-errors.csv
            migration/reports/seo-completeness-report.csv
            migration/reports/feed-compatibility-report.csv
            migration/reports/a11y-content-warnings.csv
            migration/reports/accessibility-scan-summary.md
            migration/reports/security-content-scan.csv
            migration/reports/link-rewrite-log.csv
            migration/reports/content-corrections-summary.json
            migration/reports/image-alt-corrections-audit.csv
            migration/reports/phase-5-internal-links-audit.csv
          )

          for report in "${required_reports[@]}"; do
            [[ -f "$report" ]]
          done

      - name: Upload migration reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: migration-reports-${{ github.run_id }}
          path: migration/reports/
          if-no-files-found: error
          retention-days: 7

  build:
    needs:
      - prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          export PATH="$HUGO_DIR:$PATH"
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Install Node dependencies
        run: npm ci

      - name: Lint changed Markdown files
        if: needs.prepare.outputs.markdown_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t markdown_files < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | grep -E '\.md$' || true)
          if [[ ${#markdown_files[@]} -eq 0 ]]; then
            exit 0
          fi
          npx markdownlint-cli2 "${markdown_files[@]}"

      - name: Validate front matter
        run: npm run validate:frontmatter

      - name: Build production site
        run: hugo --minify --environment production

      - name: Run URL parity check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:url-parity

      - name: Run redirect signal validation check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:redirects:seo

      - name: Run SEO smoke check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:seo:artifact

      - name: Run metadata validation check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:metadata

      - name: Run schema validation check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:schema

      - name: Run sitemap and feed validation check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:sitemap

      - name: Run crawl-control validation check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:crawl-controls

      - name: Run internal link check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: npm run check:internal-links

      - name: Archive production validation output
        if: ${{ !cancelled() && needs.prepare.outputs.full_site_route_validation_required == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf tmp/pr-ci-prod-public
          mkdir -p tmp/pr-ci-prod-public
          cp -R public/. tmp/pr-ci-prod-public/

      - name: Build preview rehearsal site
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: hugo --gc --minify --environment preview --baseURL "https://taurgis.github.io/rhino-inquisitor-com/"

      - name: Run preview crawl-control validation check
        if: needs.prepare.outputs.full_site_route_validation_required == 'true'
        run: node scripts/seo/check-crawl-controls.js --mode preview --base-url "https://taurgis.github.io/rhino-inquisitor-com/" --report tmp/pr-preview-crawl-control-audit.csv

      - name: Upload production validation artifact
        if: ${{ !cancelled() && needs.prepare.outputs.full_site_route_validation_required == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-artifacts-${{ github.run_id }}
          path: |
            public
            tmp/pr-ci-prod-public
            tmp/pr-preview-crawl-control-audit.csv
            migration/reports/phase-5-crawl-control-audit.csv
            migration/phase-5-redirect-signal-matrix.csv
            migration/reports/phase-5-redirect-validation.csv
            migration/reports/phase-5-metadata-report.csv
            migration/reports/phase-5-schema-audit.csv
            migration/reports/phase-5-sitemap-audit.csv
            migration/reports/phase-5-internal-links-audit.csv
            migration/url-parity-report.json
          if-no-files-found: error
          retention-days: 7


  accessibility:
    needs:
      - prepare
    if: needs.prepare.outputs.route_sensitive == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          export PATH="$HUGO_DIR:$PATH"
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Install Node dependencies
        run: npm ci

      - name: Run accessibility baseline
        id: accessibility_check
        continue-on-error: true
        run: npm run check:a11y

      - name: Summarize accessibility result
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.accessibility_check.outcome }}" == "success" ]]; then
            echo "Accessibility baseline passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Accessibility baseline failed. Fix it or record a Phase 3 risk acceptance before RHI-030 closes." >> "$GITHUB_STEP_SUMMARY"
          fi

  performance:
    needs:
      - prepare
    if: needs.prepare.outputs.route_sensitive == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          export PATH="$HUGO_DIR:$PATH"
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Install Node dependencies
        run: npm ci

      - name: Run performance baseline
        id: performance_check
        run: npm run check:perf

      - name: Summarize performance result
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.performance_check.outcome }}" == "success" ]]; then
            echo "Performance gate passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Performance gate failed. RHI-054 now treats this as a blocking Phase 5 regression." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-lhci-artifacts-${{ github.run_id }}
          path: |
            tmp/lhci
            public
          if-no-files-found: error
          retention-days: 7