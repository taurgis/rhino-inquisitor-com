name: Build Pull Requests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: 0.157.0
  NODE_VERSION: 18

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      route_sensitive: ${{ steps.changes.outputs.route_sensitive }}
      markdown_changed: ${{ steps.changes.outputs.markdown_changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | tee changed-files.txt

          if grep -Eq '^(src/content/|src/layouts/|src/static/|src/archetypes/|hugo\.toml$|scripts/|migration/url-manifest\.json$)' changed-files.txt; then
            echo "route_sensitive=true" >> "$GITHUB_OUTPUT"
          else
            echo "route_sensitive=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '\.md$' changed-files.txt; then
            echo "markdown_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "markdown_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs:
      - prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Install Node dependencies
        run: npm ci

      - name: Lint changed Markdown files
        if: needs.prepare.outputs.markdown_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t markdown_files < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | grep -E '\.md$' || true)
          if [[ ${#markdown_files[@]} -eq 0 ]]; then
            exit 0
          fi
          npx markdownlint-cli2 "${markdown_files[@]}"

      - name: Validate front matter
        run: npm run validate:frontmatter

      - name: Build production site
        run: hugo --minify --environment production

      - name: Run URL parity check
        if: needs.prepare.outputs.route_sensitive == 'true'
        run: npm run check:url-parity

      - name: Run SEO smoke check
        if: needs.prepare.outputs.route_sensitive == 'true'
        run: npm run check:seo

      - name: Run internal link check
        if: needs.prepare.outputs.route_sensitive == 'true'
        run: npm run check:links

  accessibility:
    needs:
      - prepare
    if: needs.prepare.outputs.route_sensitive == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Install Node dependencies
        run: npm ci

      - name: Run accessibility baseline
        id: accessibility_check
        continue-on-error: true
        run: npm run check:a11y

      - name: Summarize accessibility result
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.accessibility_check.outcome }}" == "success" ]]; then
            echo "Accessibility baseline passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Accessibility baseline failed. Fix it or record a Phase 3 risk acceptance before RHI-030 closes." >> "$GITHUB_STEP_SUMMARY"
          fi

  performance:
    needs:
      - prepare
    if: needs.prepare.outputs.route_sensitive == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Install Node dependencies
        run: npm ci

      - name: Run performance baseline
        id: performance_check
        continue-on-error: true
        run: npm run check:perf

      - name: Summarize performance result
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.performance_check.outcome }}" == "success" ]]; then
            echo "Performance baseline passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Performance baseline failed. Fix it or record a Phase 3 risk acceptance before RHI-030 closes." >> "$GITHUB_STEP_SUMMARY"
          fi