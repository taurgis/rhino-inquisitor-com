name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  HUGO_VERSION: 0.157.0
  NODE_VERSION: 20.18.1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Restore Hugo extended binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo/${{ env.HUGO_VERSION }}
          key: ${{ runner.os }}-hugo-${{ env.HUGO_VERSION }}

      - name: Install Hugo extended
        shell: bash
        run: |
          set -euo pipefail
          HUGO_DIR="$HOME/.cache/hugo/${HUGO_VERSION}"
          if [[ ! -x "$HUGO_DIR/hugo" ]]; then
            mkdir -p "$HUGO_DIR"
            curl -fsSL -o "$RUNNER_TEMP/hugo.tar.gz" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
            tar -xzf "$RUNNER_TEMP/hugo.tar.gz" -C "$HUGO_DIR" hugo
          fi
          export PATH="$HUGO_DIR:$PATH"
          echo "$HUGO_DIR" >> "$GITHUB_PATH"
          hugo version

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node dependencies
        run: npm ci

      - name: Validate front matter
        run: npm run validate:frontmatter

      - name: Build production validation site
        shell: bash
        run: |
          set -euo pipefail
          build_started_at=$(node -e 'console.log(Date.now())')
          hugo --minify --environment production
          build_finished_at=$(node -e 'console.log(Date.now())')
          echo "PAGES_CONSTRAINTS_BUILD_DURATION_MS=$((build_finished_at - build_started_at))" >> "$GITHUB_ENV"

      - name: Validate URL inventory
        run: npm run validate:url-inventory

      - name: Run Pages artifact constraints check
        run: npm run check:pages-constraints

      - name: Run URL parity check
        run: npm run check:url-parity

      - name: Run redirect target existence check
        run: npm run check:redirect-targets

      - name: Run redirect chain check
        run: npm run check:redirect-chains

      - name: Run canonical alignment check
        run: npm run check:canonical-alignment

      - name: Run retirement policy check
        run: npm run check:retirement-policy

      - name: Run host and protocol check
        run: npm run check:host-protocol

      - name: Run redirect security check
        run: npm run check:redirect-security

      - name: Run redirect signal validation check
        run: npm run check:redirects:seo

      - name: Run metadata validation check
        run: npm run check:metadata

      - name: Run image and video SEO validation check
        run: npm run check:images

      - name: Run schema validation check
        run: npm run check:schema

      - name: Run sitemap and feed validation check
        run: npm run check:sitemap

      - name: Run crawl-control validation check
        run: npm run check:crawl-controls

      - name: Run SEO smoke check
        run: npm run check:seo:artifact

      - name: Run internal link check
        run: npm run check:internal-links

      - name: Run accessibility gate
        run: npm run check:a11y:seo

      - name: Run performance gate
        run: npm run check:perf:gate

      - name: Archive production validation output
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf tmp/ci-prod-public
          mkdir -p tmp/ci-prod-public
          cp -R public/. tmp/ci-prod-public/

      - name: Normalize preview base URL
        id: preview_base
        env:
          RAW_PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'EOF'
          const rawBaseUrl = process.env.RAW_PAGES_BASE_URL;

          if (!rawBaseUrl) {
            throw new Error('Missing RAW_PAGES_BASE_URL from actions/configure-pages.');
          }

          const normalized = new URL(rawBaseUrl);
          normalized.protocol = 'https:';
          normalized.pathname = normalized.pathname.replace(/\/$/, '');

          const output = process.env.GITHUB_OUTPUT;
          require('node:fs').appendFileSync(output, `base_url=${normalized.toString()}\n`, 'utf8');
          EOF

      - name: Build preview rehearsal site
        run: hugo --gc --minify --environment preview --baseURL "${{ steps.preview_base.outputs.base_url }}/"

      - name: Run preview crawl-control validation check
        run: node scripts/seo/check-crawl-controls.js --mode preview --base-url "${{ steps.preview_base.outputs.base_url }}/" --report tmp/ci-preview-crawl-control-audit.csv

      - name: Verify preview-host path prefix and noindex
        env:
          PAGES_BASE_URL: ${{ steps.preview_base.outputs.base_url }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require('node:fs');

          const html = fs.readFileSync('public/index.html', 'utf8');
          const baseUrl = process.env.PAGES_BASE_URL;

          if (!baseUrl) {
            throw new Error('Missing PAGES_BASE_URL from actions/configure-pages.');
          }

          if (!baseUrl.startsWith('https://')) {
            throw new Error(`Expected HTTPS preview base URL, received: ${baseUrl}`);
          }

          const { pathname } = new URL(baseUrl);
          const basePath = pathname === '/' ? '' : pathname.replace(/\/$/, '');
          const expectedStylesheetPath = `${basePath}/styles/site.css`;
          const escapedStylesheetPath = expectedStylesheetPath.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const stylesheetPattern = new RegExp(`href=(?:"|')?${escapedStylesheetPath}(?:"|')?`);

          if (!stylesheetPattern.test(html)) {
            throw new Error(`Preview HTML is missing the expected stylesheet path: ${expectedStylesheetPath}`);
          }

          if (!html.includes('noindex, nofollow')) {
            throw new Error('Preview HTML is missing the expected noindex, nofollow robots directive.');
          }
          EOF

      - name: Upload audit artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: phase-3-build-artifacts-${{ github.sha }}
          path: |
            public
            tmp/ci-prod-public
            tmp/ci-preview-crawl-control-audit.csv
            migration/reports/phase-5-crawl-control-audit.csv
            migration/phase-5-redirect-signal-matrix.csv
            migration/reports/phase-5-redirect-validation.csv
            migration/reports/phase-5-metadata-report.csv
            migration/reports/phase-5-schema-audit.csv
            migration/reports/phase-5-sitemap-audit.csv
            migration/reports/phase-5-pages-constraints-report.md
            migration/reports/phase-5-internal-links-audit.csv
            migration/reports/phase-5-accessibility-audit.md
            migration/reports/phase-6-redirect-targets.csv
            migration/reports/phase-6-chains-loops.csv
            migration/reports/phase-6-canonical-alignment.csv
            migration/reports/phase-6-retired-url-audit.csv
            migration/reports/phase-6-redirect-security.csv
            migration/url-parity-report.json
            tmp/phase-6-host-protocol
            tmp/lhci
          if-no-files-found: error
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize deployed URL
        shell: bash
        run: |
          echo "Pages URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"